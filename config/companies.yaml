workday:
  # tenant + wd_num + site come from the careers URL; verify each before trusting.
  - { company: NVIDIA,         tenant: nvidia,     wd_num: 5,  site: NVIDIAExternalCareerSite }
  - { company: Visa,           tenant: visa,       wd_num: 5,  site: Visa }
  - { company: Salesforce,     tenant: salesforce, wd_num: 12, site: External_Career_Site }
  - { company: Capital One,    tenant: capitalone, wd_num: 12, site: Capital_One }
  - { company: Morgan Stanley, tenant: ms, wd_num: 5, site: External }
  - { company: Medtronic,      tenant: medtronic, wd_num: 1, site: MedtronicCareers }
  - { company: Adobe,          tenant: adobe, wd_num: 5, site: external_experienced }
  - { company: PayPal,         tenant: paypal, wd_num: 1, site: jobs }
  - { company: eBay,           tenant: ebay, wd_num: 5, site: apply }
  - { company: Snap,           tenant: snapchat, wd_num: 1, site: snap }
  # Walmart's former Workday tenant currently returns ERR_TENANT_MIGRATED.
  - { company: Walmart, tenant: walmart, wd_num: 5, site: WalmartExternal, enabled: false }
  # Goldman's CXS endpoint rejected the generic body (422) — needs the exact
  # site name from its careers URL. Left disabled until verified.
  - { company: Goldman Sachs, tenant: goldmansachs, wd_num: 1, site: GS_External, enabled: false }

smartrecruiters:
